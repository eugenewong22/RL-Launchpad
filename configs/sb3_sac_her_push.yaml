# SB3 SAC+HER baseline (R2 second library arm): SAC's entropy-driven
# exploration sidesteps the deterministic-actor saturation failure that
# flattens out-of-the-box TD3 here, making it SB3's best fair shot on
# FetchPush. Same task/obs/action/eval protocol as every other arm.
env_id: FetchPush-v4
algo: sac
total_env_steps: 1000000
eval_every: 10000
n_eval_episodes: 20
her_k: 4
tau: 0.05
run_dir: results/push_sb3_sac
